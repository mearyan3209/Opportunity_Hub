kind = "web"
previewPath = "/"
title = "OpportunityHub"
version = "1.0.0"
id = "artifacts/opportunity-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23573

[services.development]
run = "pnpm --filter @workspace/opportunity-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opportunity-hub", "run", "build" ]
publicDir = "artifacts/opportunity-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23573"
BASE_PATH = "/"
